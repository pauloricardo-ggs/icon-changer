name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without the v prefix"
        required: true
        type: string

permissions:
  contents: write

env:
  APP_NAME: icon-changer
  PROJECT_PATH: icon-changer.xcodeproj
  SCHEME: icon-changer
  TAP_REPOSITORY: pauloricardo-ggs/homebrew-tap

jobs:
  release:
    runs-on: macos-26

    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Build app
        run: |
          xcodebuild \
            -project "${PROJECT_PATH}" \
            -scheme "${SCHEME}" \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            ENABLE_APP_SANDBOX=NO \
            clean build

      - name: Package app
        id: package
        run: |
          APP_PATH="build/Build/Products/Release/${APP_NAME}.app"
          ZIP_NAME="${APP_NAME}-${{ steps.version.outputs.version }}.zip"

          test -d "${APP_PATH}"
          ditto -c -k --keepParent "${APP_PATH}" "${ZIP_NAME}"

          SHA256="$(shasum -a 256 "${ZIP_NAME}" | awk '{print $1}')"
          echo "zip_name=${ZIP_NAME}" >> "${GITHUB_OUTPUT}"
          echo "sha256=${SHA256}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          ZIP_NAME="${{ steps.package.outputs.zip_name }}"

          gh release view "${TAG}" >/dev/null 2>&1 || \
            gh release create "${TAG}" --title "${TAG}" --notes "Release ${TAG}"

          gh release upload "${TAG}" "${ZIP_NAME}" --clobber

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_REPOSITORY }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update cask
        working-directory: homebrew-tap
        run: |
          mkdir -p Casks
          cat > Casks/icon-changer.rb <<'RUBY'
          cask "icon-changer" do
            version "__VERSION__"
            sha256 "__SHA256__"

            url "https://github.com/pauloricardo-ggs/icon-changer/releases/download/v#{version}/icon-changer-#{version}.zip"
            name "Icon Changer"
            desc "Customize macOS application icons"
            homepage "https://github.com/pauloricardo-ggs/icon-changer"

            app "icon-changer.app"
          end
          RUBY

          perl -0pi -e 's/__VERSION__/${{ steps.version.outputs.version }}/g; s/__SHA256__/${{ steps.package.outputs.sha256 }}/g' Casks/icon-changer.rb

      - name: Push tap update
        working-directory: homebrew-tap
        run: |
          if git diff --quiet; then
            echo "Tap already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/icon-changer.rb
          git commit -m "Update icon-changer to ${{ steps.version.outputs.version }}"
          git push
